name: build-publish

# Post-merge image publish (ADR 0008). Separate concern from `ci.yml`
# (ADR 0006's PR gate, which runs `mvnw verify` and, since platform#6, a
# Trivy build+scan of the same image with no push): this workflow builds
# and pushes container images and only runs after code lands on `main`, so
# it never blocks a PR and isn't part of the required `ci` check. No
# redundant scan here — the PR gate already proved this image clean before
# merge, so this job trusts that and is pure build+push.
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Static list, not dynamic module detection (YAGNI/boring per ADR
        # 0008): `gateway` and `api` are real Maven modules today, `workers`
        # is still an empty placeholder dir (services#3). Add a service to
        # this list the same day its module is scaffolded.
        service: [gateway, api]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          build-args: MODULE=${{ matrix.service }}
          tags: ghcr.io/adamastorx/${{ matrix.service }}:${{ github.sha }}
          push: true
