name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode --no-transfer-progress verify

  scan:
    # Trivy CVE gate (platform#6). Builds the image here (no push) so a
    # vulnerable image never merges to main in the first place, rather than
    # scanning post-merge in build-publish.yml after the commit already
    # landed (see PR description for the full option comparison).
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Static list, mirrors build-publish.yml (ADR 0008): only `gateway`
        # is a real Maven module today. Add a service here the same day
        # it's added to build-publish.yml's matrix.
        service: [gateway]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build image for scanning (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: MODULE=${{ matrix.service }}
          tags: adamastorx/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          push: false
          load: true

      - name: Scan image for critical/high CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: adamastorx/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: '1'
          # No fix available == nothing actionable to do about it today, so
          # don't fail the build on those (documented choice, see PR body).
          ignore-unfixed: true

  ci:
    needs: [build, scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.build.result }}" != "success" ] \
            || [ "${{ needs.scan.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  build: ${{ needs.build.result }}"
            echo "  scan:  ${{ needs.scan.result }}"
            exit 1
          fi
          echo "All jobs succeeded."
